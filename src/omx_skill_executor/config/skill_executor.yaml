pick_place_skill:
  ros__parameters:
    # ── MoveIt2 planning frame ──────────────────────────────────────────────
    planning_frame: "world"

    # ── End-effector approach orientation (quaternion) ──────────────────────
    # This controls the gripper orientation during all Cartesian moves.
    # IMPORTANT: Tune this so the gripper faces downward toward the table.
    # identity (w=1.0) = EEF frame aligned with planning frame (no rotation).
    # Start with identity and verify in RViz; adjust based on your robot's EEF.
    #
    # Example for a 90-deg pitch (gripper facing down for some URDF configs):
    #   approach_orientation.x: 0.0
    #   approach_orientation.y: 0.707
    #   approach_orientation.z: 0.0
    #   approach_orientation.w: 0.707
    approach_orientation.x: 0.0
    approach_orientation.y: 0.0
    approach_orientation.z: 0.0
    approach_orientation.w: 1.0

    # ── Target box positions in planning frame (meters) ─────────────────────
    # Measure these in your actual setup with a ruler or TF echo.
    # The workspace guard in omx_bringup limits: z in [0.01, 0.48], xy_radius <= 0.42m
    left_box.x:  0.20
    left_box.y:  0.20
    left_box.z:  0.05     # top surface of the box

    right_box.x:  0.20
    right_box.y: -0.20
    right_box.z:  0.05

    # ── Geometry offsets ────────────────────────────────────────────────────
    grasp_z_offset:     0.00   # add block half-height if detection is projected to table
    pre_grasp_z_offset: 0.10   # approach height above block (meters)
    lift_z_offset:      0.15   # lift height above grasp point after closing
    place_z_offset:     0.08   # approach height above box before descending

    # ── Motion speed ────────────────────────────────────────────────────────
    # Normal moves use this scale; slow moves (descend/lift) use 50% of this.
    velocity_scale: 0.3        # 0.0–1.0; keep low for initial tuning
