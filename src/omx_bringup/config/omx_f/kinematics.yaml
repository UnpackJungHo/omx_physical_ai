arm:
  # 5-DOF arm + position_only_ik 환경에서 KDL 은 seed-dependent 라
  # 같은 목표에 대해 호출 시점의 joint state 에 따라 해가 흔들렸다.
  # TRAC-IK 의 Distance solve_type 은 직전 자세에서 joint 공간 거리가
  # 가장 가까운 해를 선택해 재현성을 확보한다.
  kinematics_solver: trac_ik_kinematics_plugin/TRAC_IKKinematicsPlugin
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 1
  position_only_ik: true
  solve_type: Distance
