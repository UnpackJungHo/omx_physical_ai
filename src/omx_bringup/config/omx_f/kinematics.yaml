arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  # 5-DOF arm 이므로 full 6-DOF IK 는 일반적으로 해가 없다 → position-only 유지.
  # motion_server 가 setJointValueTarget(pose, link) 로 IK 를 한 번만 풀고
  # joint-space goal 로 planning 해서 RRTConnect 가 IK 를 반복 호출하지 않도록 한다.
  kinematics_solver_timeout: 0.3
  kinematics_solver_attempts: 3
  position_only_ik: true
