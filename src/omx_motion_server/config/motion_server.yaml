# motion_server 파라미터 (yaw 정렬 캘리브레이션).
#
# joint5_yaw_sign 은 box 면과 그리퍼를 평행하게 맞출 때 world yaw delta 를
# joint5 회전 방향으로 변환하는 부호다. 자세에 따라 고정된 +1/-1 로 한 번
# 캘리브레이션한다. 과거 skill_executor.yaml 에 있던 값을, 정렬 계산을
# 단일 소스로 수행하는 compute_align_yaw service(이 노드) 로 이전했다.
#
# align_world_frame / arm_tip_link 는 C++ 기본값(world / end_effector_link)
# 이 skill 측 world_frame / gripper_link 와 일치하므로 별도 주입하지 않는다.
#
# /** 와일드카드: 이 파일은 motion_server 노드에만 전달되므로 안전하다.
/**:
  ros__parameters:
    joint5_yaw_sign: -1.0

    # ── MoveIt 모션 튜닝 (코드 하드코딩에서 외부화) ──────────────────────
    # 재컴파일 없이 속도/정밀도/계획시간을 조정한다. 미주입 시 C++ 기본값 사용.
    default_vel_scale: 0.3   # arm/gripper 기본 velocity scaling
    default_acc_scale: 0.1   # arm/gripper 기본 acceleration scaling
    quat_norm_tol: 0.01      # MoveToPose quaternion 정규화 허용 오차

    arm:
      planning_time: 5.0          # plan() 최대 계획 시간 [s]
      goal_position_tol: 0.001    # 1 mm
      goal_orientation_tol: 0.01  # ~0.57° (position_only_ik 라 영향 작음)
      goal_joint_tol: 0.001       # ~0.057° (encoder 1 step 보다 작음)

    gripper:
      planning_time: 3.0          # plan() 최대 계획 시간 [s]
      goal_joint_tol: 0.001
