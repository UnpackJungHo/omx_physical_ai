/**:
  ros__parameters:
    video_device: "/dev/video0"
    image_width: 640
    image_height: 480
    # Use the camera's MJPEG stream instead of uncompressed YUYV. YUYV at
    # 640x480@30 can intermittently hit usb_cam select timeouts on this UVC
    # camera, leaving the next launch with "Unable to start stream".
    pixel_format: "mjpeg2rgb"
    av_device_format: "YUV422P"
    frame_id: "default_cam"
    camera_frame_id: "default_cam"
    io_method: "mmap"
    framerate: 30.0
    camera_name: "default_cam"
    camera_info_url: "package://omx_perception/config/camera_intrinsics.yaml"
    topic_name: "image_raw"
    # Innomaker-U20CAM-720P (/dev/video0) V4L2 control ranges:
    #   auto_exposure: 1=Manual Mode, 3=Aperture Priority Mode(auto), default=3
    #   exposure_time_absolute: min=1, max=5000, step=1, default=156
    #   white_balance_automatic: 0=false, 1=true, default=1
    #   white_balance_temperature: min=2800, max=6500, step=1, default=4600
    #   gain: min=0, max=100, step=1, default=0
    #   brightness: min=-64, max=64, step=1, default=0
    #   contrast: min=0, max=64, step=1, default=32
    #   saturation: min=0, max=128, step=1, default=64
    #   sharpness: min=0, max=6, step=1, default=3
    #   gamma: min=72, max=500, step=1, default=100
    #   hue: min=-40, max=40, step=1, default=0
    #   backlight_compensation: min=0, max=192, step=1, default=80
    # Values outside these ranges are clamped by the camera driver.
    # 자동 노출. 컬러 검출 용도로 false
    autoexposure: false
    # 노출 시간. 올리면 화면이 밝아짐 대신 모션 블러 증가, 내리면 화면이 어두어짐, 대신 블러 감소
    # 블록이 흐리면 낮추고, 너무 어두우면 올림
    exposure: 600
    # 자동 화이트밸런스. 컬릭 검출 용도로 false. true면 HSV 범위가 흔들림
    auto_white_balance: true
    # 색 온도. 올리면 따뜻해짐(노란/주홍 쪽), 내리면 더 차가워짐(푸른 쪽)
    white_balance: 4500
    # 센서 증폭. 올리면 밝아지지만 노이즈 증가. 내리면 어두워지지만 영상이 더 깨끗해짐
    # 가능하면 exposure로 밝기 맞추고, gain은 낮게 유지하는 쪽이 굳
    gain: 8
    #  전체 밝기 오프셋. 올리면 밝아짐. 내리면 어두워짐.
    # 실제 범위: -64~64, 기본값: 0. 현재 128은 드라이버에서 64로 클램프됨.
    brightness: 128
    # 밝고 어두운 차이를 키움. 올리면 경계가 또렷해질 수 있으나 검은 영역/밝은 영역이 뭉칠 수 있음
    # 내리면 부드러워지지만 경계가 흐려짐
    # 블록 윤곽이 배경과 잘 안 갈리면 조금 올려볼 수 있음
    # 실제 범위: 0~64, 기본값: 32.
    contrast: 64
    # 색 진함 정도. 올리면 빨강/초록/파랑 분리가 쉬워짐.
    # 너무 높이면 색이 과장돼 채널 클리핑 가능
    # 컬러 블록 검출에서는 꽤 중요한 편
    # 실제 범위: 0~128, 기본값: 64.
    saturation: 64
    # 윤곽 강조. 올리면 테두리가 강해짐. 너무 높이면 노이즈/halo 증가. 보통 소폭 조정
    # 실제 범위: 0~6, 기본값: 3. 현재 24는 드라이버에서 6으로 클램프됨.
    sharpness: 6
