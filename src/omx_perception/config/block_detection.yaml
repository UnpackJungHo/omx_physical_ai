block_detection_node:
  ros__parameters:
    image_topic: "/image_raw"
    camera_info_topic: "/camera_info"
    camera_frame: "default_cam"
    table_z_in_camera: 0.30
    publish_debug_image: true

    # ── HSV tuning (adjust via rqt → Dynamic Reconfigure) ──────────
    # Red — this block is actually pink/magenta (H≈170, S≈68)
    #        band1: pure red near H=0, band2: pink/magenta near H=170
    red_h1_lo: 0
    red_h1_hi: 10
    red_h2_lo: 155   # lowered from 170 to catch H=169
    red_h2_hi: 180
    red_s_lo: 35     # CRITICAL: lowered from 100 — pink block has S≈68
    red_v_lo: 80

    # Green — block centers at H≈83
    # Green — block H=82~88 (main cluster in live lighting)
    # H_hi=88: blue block cyan face falls at H=88~95 under bright overhead light
    #           lowering from 92→88 eliminates that false positive (only 4px remain)
    #           true green loses ~15% of pixels but retains >6000px well above min_area
    # S_lo=80: stabilises H std from ±22 to ±12
    green_h_lo: 75
    green_h_hi: 88
    green_s_lo: 80
    green_v_lo: 70

    # Blue — applied to S-boosted image (BOOST_MAX=2.0 × natural S, clipped to 255)
    # H_lo=90: covers H=90~95 cluster (13 % of block pixels, missed by old H_lo=95)
    # S_lo=175 (post-boost): block S≈255 vs arm S≈160 — separation margin is retained
    #   In shadow (boost≈1.0): block natural S≈153 alone is not enough
    #   Actually validated: V×0.5 still detects all three blocks (blue conf=0.49)
    blue_h_lo: 90
    blue_h_hi: 118
    blue_s_lo: 175
    blue_v_lo: 70

    # Minimum contour area to count as a block (px²)
    min_contour_area: 2000
