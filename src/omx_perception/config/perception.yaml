detector_node:
  ros__parameters:
    reference_frame: world
    camera_frame: default_cam
    block_size_m: 0.030
    table_z_m: 0.18
    workspace_x_min_m: 0.08
    workspace_x_max_m: 0.35
    workspace_y_min_m: -0.15
    workspace_y_max_m: 0.15
    color_chroma_min: 10.0
    color_majority_min: 0.40
    canny_sigma: 0.33
    min_contour_area_px: 200.0
    max_contour_area_px: 20000.0
    saturation_min: 75
    rect_fill_min: 0.75
    aspect_ratio_min: 0.60
    aspect_ratio_max: 1.66
    use_white_balance: true
    process_period_sec: 0.02
    publish_debug_canny: false
    publish_debug_segmentation: false
    slow_frame_warn_ms: 80.0
    color_prototypes_path: ""  # set by launch file to installed config/color_prototypes.yaml

tracker_node:
  ros__parameters:
    stale_threshold_sec: 1.5
    min_confidence: 0.25
    assoc_threshold_m: 0.025
    position_alpha: 0.35
    yaw_alpha: 0.25
    confidence_alpha: 0.4

get_block_poses_server:
  ros__parameters:
    stale_threshold_sec: 2.0
    grasp_yaw_offset_deg: 0.0

color_calibrator:
  ros__parameters:
    reference_frame: world
    camera_frame: default_cam
    block_size_m: 0.030
    table_z_m: 0.18
    workspace_x_min_m: 0.08
    workspace_x_max_m: 0.35
    workspace_y_min_m: -0.15
    workspace_y_max_m: 0.15
    canny_sigma: 0.33
    min_contour_area_px: 200.0
    max_contour_area_px: 20000.0
    saturation_min: 75
    rect_fill_min: 0.75
    aspect_ratio_min: 0.60
    aspect_ratio_max: 1.66
    use_white_balance: true
    chroma_min: 10.0
    samples_per_color: 20
